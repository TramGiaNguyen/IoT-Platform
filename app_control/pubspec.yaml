name: app_control
description: BDU IoT Control App for TTCDS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^0.13.6

  # WebSocket
  web_socket_channel: ^2.4.0

  # Secure storage for token
  flutter_secure_storage: ^9.0.0

  # MJPEG stream viewer for IP cameras
  flutter_mjpeg: ^2.0.4

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - image.png

flutter_launcher_icons:
  android: true
  image_path: "image.png"
  adaptive_icon_background: "#006a6a"
  adaptive_icon_foreground: "image.png"
