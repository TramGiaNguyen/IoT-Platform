name: app_control
description: BDU IoT Control App for TTCDS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^0.13.6

  # WebSocket
  web_socket_channel: ^2.4.0

  # Secure storage for token
  flutter_secure_storage: ^9.0.0

  # Universal video player (RTSP, RTMP, HLS, DASH, MJPEG, file) on
  # Android/iOS/macOS/Windows/Linux with hardware acceleration.
  # Replaces flutter_mjpeg (which only handled MJPEG) so the mobile app
  # can play the raw RTSP stream configured in the web dashboard's
  # camera setup (e.g. Hikvision: rtsp://user:pass@ip:554/Streaming/...).
  media_kit: ^1.2.0
  media_kit_video: ^1.0.0
  media_kit_libs_android_video: ^1.0.0
  media_kit_libs_ios_video: ^1.0.0
  media_kit_libs_macos_video: ^1.0.0
  media_kit_libs_windows_video: ^1.0.0
  media_kit_libs_linux: ^1.0.0

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - image.png

flutter_launcher_icons:
  android: true
  image_path: "image.png"
  adaptive_icon_background: "#006a6a"
  adaptive_icon_foreground: "image.png"
