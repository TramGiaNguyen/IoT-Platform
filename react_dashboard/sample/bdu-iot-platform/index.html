    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
      }
      /* Custom Network Background Pattern */
      .network-bg {
        background: linear-gradient(135deg, #1a4b8e 0%, #0d2547 100%);
        position: relative;
        overflow: hidden;
      }
      /* Abstract shapes for visual interest */
      .network-bg::before {
        content: '';
        position: absolute;
        top: -10%;
        left: -10%;
        width: 50%;
        height: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%);
        border-radius: 50%;
        z-index: 1;
      }
      .network-bg::after {
        content: '';
        position: absolute;
        bottom: -10%;
        right: -10%;
        width: 60%;
        height: 60%;
        background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 70%);
        border-radius: 50%;
        z-index: 1;
      }
      .content-layer {
        position: relative;
        z-index: 10;
      }
    </style>
