services:
  mqtt:
    build:
      context: ./mqtt_auth_sync
    container_name: mqtt
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=iot
      - MYSQL_PASSWORD=iot123
      - MYSQL_DATABASE=iot_data
      - SYNC_INTERVAL=30
      - MQTT_TO_KAFKA_PASSWORD=mqtt2kafka_secret
      - SIMULATOR_PASSWORD=simulator_secret
      - RULE_ENGINE_PASSWORD=ruleengine_secret
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - mqtt-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/1883' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      # Single-broker cluster: lower replication factors to 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  zookeeper:
    image: zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand(\"ping\")' || mongo --eval 'db.adminCommand(\"ping\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo-data:/data/db

  mysql:
    image: mysql:5.7
    container_name: mysql
    ports:
      - "3308:3306"
    environment:
      TZ: Asia/Ho_Chi_Minh
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iot_data
      MYSQL_USER: iot
      MYSQL_PASSWORD: iot123
    # Phase 4: tang max_connections + innodb_buffer_pool_size qua cmdline flags
    # (tranh van de world-writable file permission tren Windows bind mount)
    # max_connections=400: 4 workers * 30 pool = 120 + buffer (rule_engine, ai_analyst, admin, headroom)
    command:
      - --max-connections=400
      - --innodb-buffer-pool-size=512M
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql-data:/var/lib/mysql
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi-backend:
    build:
      context: ./fastapi_backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka-event-consumer:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - MQTT_BROKER_HOST=mqtt
      - MQTT_USERNAME=bdu_admin
      - MQTT_PASSWORD=admin_secret
      - ALLOWED_ORIGINS=*
      - DEBUG_LOG_PATH=/workspace/debug-6eeaf8.log
      - INTERNAL_API_KEY=internal-rule-engine-key-change-in-production
      - AI_ANALYST_URL=http://ai-analyst:8101
      # Gửi X-API-Key = http_api_key của thiết bị (cùng ak_... trong file config tải về) khi POST relay xuống edge
      - EDGE_CONTROL_USE_DEVICE_HTTP_KEY=1
      # Hoặc key cố định cho mọi thiết bị: EDGE_CONTROL_API_KEY=ak_...
      # Chẩn đoán: docs/EDGE_CONTROL_DEBUG.md, scripts/verify-edge-control.ps1
      # Phase 4: workers count + MySQL pool size
      # mysql-connector-python gioi han pool_size <= 32.
      # 4 workers * 30 = 120 connections, < MySQL max_connections=300. OK.
      - UVICORN_WORKERS=4
      - MYSQL_POOL_SIZE=30
    volumes:
      - .:/workspace
    # Dung entrypoint script de parse UVICORN_WORKERS (mac dinh 4 trong prod).
    # Dat UVICORN_WORKERS=1 + them flag reload de dev single-worker reload code.
    command: ["/app/entrypoint.sh"]

  # Phase 4: tach Kafka consumer ra service rieng de tranh duplicate consume
  # khi FastAPI chay multi-worker. Service nay:
  # - Consume `iot-events` (1 instance, group ID stable)
  # - Batch UPDATE thiet_bi.last_seen + trang_thai='online'
  # - Publish event len Redis Pub/Sub `ws:events` (moi FastAPI worker se forward
  #   den WS client cua worker do)
  # - Cache 100 event moi nhat vao Redis list `ws:latest_events` (cho initial state)
  kafka-event-consumer:
    build:
      context: ./kafka_event_consumer
    container_name: kafka_event_consumer
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=iot-events
      - KAFKA_GROUP_ID=fastapi-event-bridge
      - MYSQL_HOST=mysql
      - MYSQL_USER=iot
      - MYSQL_PASSWORD=iot123
      - MYSQL_DATABASE=iot_data
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mqtt-to-kafka:
    build:
      context: ./mqtt_to_kafka
    container_name: mqtt_to_kafka
    environment:
      - MQTT_USERNAME=mqtt_to_kafka
      - MQTT_PASSWORD=mqtt2kafka_secret
      - MYSQL_HOST=mysql
      - MYSQL_USER=iot
      - MYSQL_PASSWORD=iot123
      - MYSQL_DATABASE=iot_data
    depends_on:
      mqtt:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  http-to-kafka:
    build:
      context: ./http_to_kafka
    container_name: http_to_kafka
    ports:
      - "5000:5000"
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=iot-events
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  spark-processor:
    build:
      context: ./spark_jobs
    container_name: spark_processor
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: always
    healthcheck:
      test: ["CMD", "python3", "/app/healthcheck.py"]
      interval: 120s
      timeout: 30s
      retries: 2
      start_period: 180s

  frontend:
    build:
      context: ./react_dashboard
    container_name: react_dashboard
    ports:
      - "3000:3000"
    depends_on:
      fastapi-backend:
        condition: service_healthy
    restart: unless-stopped

  backend-app-control:
    build:
      context: ./backend_app_control
    container_name: backend_app_control
    ports:
      - "8001:8001"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - IOT_PLATFORM_URL=http://fastapi-backend:8000
      - JWT_SECRET=your-secret-key-change-in-production
      - DEVICE_ID=gateway-701e68b1
      - AC_CONTROL_URL=http://192.168.190.101
      - AI_ANALYST_URL=http://ai-analyst:8101
    depends_on:
      fastapi-backend:
        condition: service_healthy
    restart: unless-stopped

  device-control:
    build:
      context: ./device_control
    container_name: device_control
    ports:
      - "8100:8000"
    depends_on:
      mqtt:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: unless-stopped

  simulator:
    build:
      context: ./simulators
    container_name: device_simulator
    environment:
      - MQTT_USERNAME=device_simulator
      - MQTT_PASSWORD=simulator_secret
    depends_on:
      mqtt:
        condition: service_healthy
    restart: unless-stopped

  coap-adapter:
    build:
      context: ./coap_adapter
    container_name: coap_adapter
    ports:
      - "5683:5683"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=iot-events
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  rule-engine:
    build:
      context: ./rule_engine
    container_name: rule_engine
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - MQTT_USERNAME=rule_engine
      - MQTT_PASSWORD=ruleengine_secret
      - MYSQL_HOST=mysql
      - MYSQL_USER=iot
      - MYSQL_PASSWORD=iot123
      - MYSQL_DATABASE=iot_data
      - DEVICE_OFFLINE_THRESHOLD_MINUTES=10
      - IOT_PLATFORM_URL=http://fastapi-backend:8000
      - INTERNAL_API_KEY=internal-rule-engine-key-change-in-production
      - AI_ANALYST_URL=http://ai-analyst:8101
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ZALO_ACCESS_TOKEN=${ZALO_ACCESS_TOKEN:-}
      - SMTP_SERVER=${SMTP_SERVER:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    depends_on:
      mqtt:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      device-control:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - mongodb
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

  ai-analyst:
    build:
      context: ./ai_analyst
    container_name: ai_analyst
    ports:
      - "8101:8101"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - IOT_PLATFORM_URL=http://fastapi-backend:8000
      - INTERNAL_API_KEY=internal-rule-engine-key-change-in-production
      - YOLO_MODEL_SIZE=yolo11s.pt
      - OCCUPANCY_REPORT_INTERVAL=1.0
      - STREAM_FPS_DIVISOR=2
      # Camera góc cao / người nhỏ: imgsz lớn giúp có bbox; conf "một chút" để bắt chính xác
      - CONF_THRESHOLD=0.28
      - YOLO_IMGSZ=1280
      - YOLO_HALF=0
      # AI nền 24/7: bật để session tự chạy cho mọi camera active
      - ROOM_AI_BACKGROUND=1
      # CUDA GPU passthrough (requires nvidia-runtime on host)
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      fastapi-backend:
        condition: service_healthy
    restart: unless-stopped
    # GPU not available in Docker Desktop on Windows? Build the image without
    # the GPU requirement and run on CPU for development:
    # comment out deploy.resources.reservations.devices above and uncomment:
    # shm_size: 256mb  # helps with OpenCV performance on CPU

volumes:
  mysql-data:
  mongo-data:
  mqtt-data:
  redis-data: